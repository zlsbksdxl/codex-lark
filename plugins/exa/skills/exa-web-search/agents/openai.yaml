interface:
  display_name: "Exa Web Search"
  short_description: "Search and fetch current web sources with Exa"
  default_prompt: "Use $exa-web-search to research this topic on the web with current sources."

dependencies:
  tools:
    - type: "mcp"
      value: "exa"
      description: "Exa web search and webpage retrieval MCP server"
      transport: "stdio"

policy:
  allow_implicit_invocation: true
